version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: aqylqala-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: aqylqala
      POSTGRES_PASSWORD: aqylqala_pass
      POSTGRES_DB: aqylqala
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: aqylqala-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  pgdata:
